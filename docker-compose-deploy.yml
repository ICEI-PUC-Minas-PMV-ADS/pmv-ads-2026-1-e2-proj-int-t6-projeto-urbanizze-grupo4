networks:
  traefik_proxy:
    external: true

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    networks:
      - traefik_proxy
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-SenhaForte@123}"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "0.3"
          memory: 4096M
        reservations:
          cpus: "0.3"
          memory: 4096M
      update_config:
        order: start-first
        failure_action: rollback
        parallelism: 1
        delay: 10s

  app:
    image: andrecabral21/pmv-ads-2026-1-e2-proj-int-t6-projeto-urbanizze-grupo4-app:latest
    restart: unless-stopped
    networks:
      - traefik_proxy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sql-server,1433;Database=urbanizze_prod;User Id=sa;Password=${DB_PASSWORD:-SenhaForte@123};TrustServerCertificate=True;MultipleActiveResultSets=true"
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "0.2"
          memory: 1024M
        reservations:
          cpus: "0.2"
          memory: 1024M
      update_config:
        order: start-first
        failure_action: rollback
        parallelism: 1
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.urbanizze.rule=Host(`urbanizze.3-140-157-48.nip.io`)"
        - "traefik.http.routers.urbanizze.entrypoints=websecure"
        - "traefik.http.routers.urbanizze.tls=true"
        - "traefik.http.routers.urbanizze.tls.certresolver=leresolver"
        - "traefik.http.services.urbanizze.loadbalancer.server.port=80"

volumes:
  mssql_data:
