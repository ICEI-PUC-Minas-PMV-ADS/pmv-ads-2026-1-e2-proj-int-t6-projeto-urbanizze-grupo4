services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-SenhaForte@123}"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: ./src/Urbanizze
      dockerfile: Dockerfile
    container_name: urbanizze-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sql-server,1433;Database=urbanizze_prod;User Id=sa;Password=${DB_PASSWORD:-SenhaForte@123};TrustServerCertificate=True;MultipleActiveResultSets=true"
    depends_on:
      sql-server:
        condition: service_healthy

volumes:
  mssql_data:
